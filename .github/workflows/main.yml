name: Auto Generate Posts

on:
  schedule:
    - cron: '0 22 * * *'  # 매일 새벽 1시 (KST = UTC+9)
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai requests python-dotenv

      - name: Generate posts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python scripts/generate-post.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "feat: auto generate posts $(date +%Y-%m-%d)"
          git push
