name: wooriwin.com 백링크 자동 포스팅

on:
  schedule:
    - cron: '0 4 * * 1'  # 매주 월요일 13:00 KST
  workflow_dispatch: {}

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai requests python-dotenv google-auth google-auth-oauthlib google-api-python-client markdown

      - name: Restore Google Service Account Key
        run: |
          mkdir -p keys
          echo '${{ secrets.GOOGLE_INDEXING_KEY }}' | base64 -d > keys/wooriwin-indexing.json

      - name: Run backlink rotation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_GIST_TOKEN: ${{ secrets.GH_GIST_TOKEN }}
          BLOGGER_BLOG_URL: ${{ secrets.BLOGGER_BLOG_URL }}
          BLOGGER_OAUTH_TOKEN: ${{ secrets.BLOGGER_OAUTH_TOKEN }}
          TELEGRAPH_ACCESS_TOKEN: ${{ secrets.TELEGRAPH_ACCESS_TOKEN }}
          WRITEAS_USERNAME: ${{ secrets.WRITEAS_USERNAME }}
          WRITEAS_PASSWORD: ${{ secrets.WRITEAS_PASSWORD }}
          TUMBLR_CONSUMER_KEY: ${{ secrets.TUMBLR_CONSUMER_KEY }}
          TUMBLR_CONSUMER_SECRET: ${{ secrets.TUMBLR_CONSUMER_SECRET }}
          TUMBLR_TOKEN: ${{ secrets.TUMBLR_TOKEN }}
          TUMBLR_TOKEN_SECRET: ${{ secrets.TUMBLR_TOKEN_SECRET }}
          TUMBLR_BLOG_NAME: ${{ secrets.TUMBLR_BLOG_NAME }}
        run: python scripts/backlink-rotation.py
